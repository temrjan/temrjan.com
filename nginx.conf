# temrjan.com Nginx configuration
# Place in /etc/nginx/sites-available/temrjan.com
# ln -s /etc/nginx/sites-available/temrjan.com /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name temrjan.com www.temrjan.com;

    # Redirect to HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    root /var/www/temrjan;
    index index.html;

    # Root redirect to /en/
    location = / {
        return 302 /en/;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static asset caching
    location ~* \.(woff2|woff|ttf|eot|ico|svg|webp|jpg|jpeg|png|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback per language
    location ~ ^/(en|uz|ru)/ {
        try_files $uri $uri/ /$1/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
